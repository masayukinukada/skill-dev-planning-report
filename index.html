<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スキル分析・育成計画 レポートジェネレーター</title>
  <style>
    /* ==============================================
       カラーパレット（会社テーマカラー準拠）
       --green:       #02993B  メインカラー
       --orange:      #F39346  アクセントカラー
       --white:       #FFFFFF  背景色
       --text:        #212121  文字色
       --gray:        #6b7280  補助テキスト
       --light:       #f3f4f6  ページ背景
       --green-light: #e6f5ec  グリーン薄（カード背景など）
       --orange-light:#fef3e8  オレンジ薄（ハイライトなど）
    ============================================== */

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans JP", "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
      background: #f3f4f6;
      color: #212121;
      line-height: 1.6;
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ヘッダー */
    .app-header {
      background: #02993B;
      color: #fff;
      padding: 28px 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .app-header::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
      pointer-events: none;
    }
    .app-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .app-header p {
      font-size: 0.82rem;
      opacity: 0.88;
      letter-spacing: 0.01em;
    }
    .app-header-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    /* ステップナビゲーション */
    .step-nav {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .step-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px 10px;
      border: none;
      border-bottom: 3px solid transparent;
      background: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      color: #9ca3af;
      transition: color .2s, border-color .2s, background .2s;
    }
    .step-btn:hover {
      background: #f9fafb;
      color: #6b7280;
    }
    .step-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      background: #e5e7eb;
      color: #9ca3af;
      transition: background .2s, color .2s;
    }
    /* 現在のステップ */
    .step-btn.active {
      color: #02993B;
      border-bottom-color: #02993B;
      font-weight: 600;
    }
    .step-btn.active .step-num {
      background: #02993B;
      color: #fff;
    }
    /* 完了済みステップ */
    .step-btn.done {
      color: #F39346;
    }
    .step-btn.done .step-num {
      background: #F39346;
      color: transparent;  /* 数字を隠す */
      font-size: 0.7rem;
      position: relative;
    }
    .step-btn.done .step-num::before {
      content: '✓';
      position: absolute;
      color: #fff;
    }

    /* カード */
    .card {
      background: #fff;
      margin: 24px 16px;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #02993B;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e6f5ec;
    }

    /* フィールドグリッド */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #212121;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: #02993B;
      box-shadow: 0 0 0 3px rgba(2,153,59,.12);
    }
    .field textarea { resize: vertical; }
    .req { color: #e53e3e; }

    /* エラーメッセージ */
    .error-msg {
      margin-top: 10px;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 6px;
      color: #c53030;
      font-size: 0.85rem;
    }

    /* ボタン行 */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-pri {
      background: #02993B;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-pri:hover { background: #027a30; }
    .btn-sec {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-sec:hover { background: #e5e7eb; }

    /* テーブル */
    .tbl-wrap {
      overflow-x: auto;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    .tbl-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
      white-space: nowrap;
    }
    .tbl-wrap thead th {
      background: #f9fafb;
      padding: 9px 10px;
      text-align: left;
      border-bottom: 2px solid #e5e7eb;
      font-weight: 600;
      color: #374151;
    }
    .tbl-wrap tbody td {
      padding: 6px 8px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    .tbl-wrap tbody tr:last-child td { border-bottom: none; }
    .tbl-wrap tbody tr:hover td { background: #f9fafb; }
    .tbl-wrap input,
    .tbl-wrap select {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 5px 7px;
      font-size: 0.82rem;
      font-family: inherit;
      color: #212121;
      background: #fff;
      transition: border-color .15s;
    }
    .tbl-wrap input:focus,
    .tbl-wrap select:focus {
      outline: none;
      border-color: #02993B;
    }

    /* 案件カード */
    .proj-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #fff;
    }
    .proj-row1 {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .proj-field-name    { flex: 2; }
    .proj-field-overview { flex: 3; }
    .proj-row1 .del-btn { flex-shrink: 0; margin-bottom: 1px; }
    .proj-row2 {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .proj-field-period  { flex: 0 0 auto; }
    .proj-field-skill   { flex: 1; min-width: 180px; }
    .proj-row2 .field:last-child { flex: 0 0 80px; }

    /* 実施期間インライン入力 */
    .period-inputs {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .period-inputs input[type="month"] {
      width: 130px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 5px 7px;
      font-size: 0.82rem;
      font-family: inherit;
      color: #212121;
      background: #fff;
      transition: border-color .15s;
    }
    .period-inputs input[type="month"]:focus {
      outline: none;
      border-color: #02993B;
    }
    .period-sep { color: #6b7280; font-size: 0.8rem; }

    /* 行追加・削除ボタン */
    .add-btn {
      margin-top: 8px;
      background: #e6f5ec;
      color: #02993B;
      border: 1px dashed #02993B;
      border-radius: 6px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .add-btn:hover { background: #d0edda; }
    .del-btn {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
      border-radius: 4px;
      padding: 4px 9px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .del-btn:hover { background: #fed7d7; }

    /* レポート生成ボタン */
    .btn-gen {
      background: #F39346;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 32px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-gen:hover { background: #e07d2f; }

    /* メンバーカード */
    .member-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #fff;
    }
    .member-row1 {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .member-field-name   { flex: 0 0 150px; }
    .member-field-skill  { flex: 2; min-width: 0; }
    .member-row2 {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .member-field-lv     { flex: 0 0 80px; }
    .member-field-measure { flex: 1; }
    .member-row2 .del-btn { flex-shrink: 0; margin-bottom: 1px; }

    /* 育成方針エントリカード */
    .policy-entry-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 12px;
      background: #fff;
    }
    .policy-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .policy-entry-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #02993B;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* プレビューエリア */
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .preview-header h2 { margin-bottom: 0; }
    .btn-dl {
      background: #F39346;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 22px;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-dl:hover { background: #e07d2f; }

    /* ステップパネル フェードイン */
    .step-panel {
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 保存・読み込みツール */
    .step-nav-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      flex-shrink: 0;
    }
    .nav-sep {
      width: 1px;
      height: 28px;
      background: #e5e7eb;
      margin-right: 4px;
    }
    .btn-save, .btn-load {
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 0.76rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-save {
      background: #e6f5ec;
      color: #02993B;
      border: 1px solid #02993B;
    }
    .btn-save:hover { background: #d0edda; }
    .btn-load {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-load:hover { background: #e5e7eb; }

    /* 読み込みエラーバナー */
    .load-error {
      margin: 8px 16px 0;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 6px;
      color: #c53030;
      font-size: 0.85rem;
    }

    /* レスポンシブ（〜640px） */
    @media (max-width: 640px) {
      .field-grid {
        grid-template-columns: 1fr;
      }
      .proj-row1,
      .proj-row2 {
        flex-wrap: wrap;
      }
      .proj-field-name,
      .proj-field-overview {
        flex: 1 1 100%;
      }
      .proj-field-period,
      .proj-field-skill {
        flex: 1 1 100%;
        min-width: 0;
      }
      .member-row1,
      .member-row2 {
        flex-wrap: wrap;
      }
      .member-field-name,
      .member-field-skill {
        flex: 1 1 100%;
      }
      .member-field-lv { flex: 1; }
      .trainee-row { flex-wrap: wrap; }
      .trainee-row .field:first-child { flex: 1 1 100%; }
      .card { padding: 20px 16px; margin: 16px 8px; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ヘッダー -->
    <div class="app-header">
      <div class="app-header-label">IT人財育成ツール</div>
      <h1>スキル分析・育成計画 レポートジェネレーター</h1>
      <p>フォームに入力してレポートを生成 → HTMLファイルとしてダウンロード（サーバー不要）</p>
    </div>

    <!-- ステップナビゲーション -->
    <nav class="step-nav">
      <button class="step-btn active" onclick="goStep(0)">
        <span class="step-num">1</span>
        <span>基本情報</span>
      </button>
      <button class="step-btn" onclick="goStep(1)">
        <span class="step-num">2</span>
        <span>予定案件</span>
      </button>
      <button class="step-btn" onclick="goStep(2)">
        <span class="step-num">3</span>
        <span>育成方針</span>
      </button>
      <button class="step-btn" onclick="goStep(3)">
        <span class="step-num">4</span>
        <span>育成目標</span>
      </button>
      <div class="step-nav-tools">
        <div class="nav-sep"></div>
        <button class="btn-save" onclick="saveData()">保存</button>
        <button class="btn-load" onclick="loadData()">読み込み</button>
      </div>
    </nav>
    <input type="file" id="load-file-input" accept=".json" style="display:none" onchange="onFileSelected(event)">
    <div id="load-error" class="load-error" hidden></div>

    <!-- Step1: 基本情報 -->
    <div id="step0" class="step-panel">
      <div class="card">
        <h2>Step 1 — 基本情報</h2>
        <div class="field-grid">
          <div class="field">
            <label for="f-year">年度 <span class="req">*</span></label>
            <input type="text" id="f-year" placeholder="例: 2025年度">
          </div>
          <div class="field">
            <label for="f-team">部門 / チーム名 <span class="req">*</span></label>
            <select id="f-team">
              <option value="">-- 選択してください --</option>
              <option>デジタル基盤グループ・オープンシステム基盤チーム</option>
              <option>デジタル基盤グループ・ネットワーク基盤チーム</option>
              <option>デジタル基盤グループ・コールセンター基盤チーム</option>
              <option>デジタル基盤グループ・クラウド推進チーム</option>
            </select>
          </div>
          <div class="field">
            <label for="f-leader">リーダー名 <span class="req">*</span></label>
            <input type="text" id="f-leader" placeholder="例: 山田 太郎">
          </div>
          <div class="field">
            <label for="f-period">対象期間</label>
            <input type="text" id="f-period">
          </div>
          <div class="field">
            <label for="f-date">作成日</label>
            <input type="date" id="f-date">
          </div>
          <div class="field">
            <label for="f-theme">重点テーマ</label>
            <input type="text" id="f-theme" placeholder="例: クラウド移行、内製化推進">
          </div>
        </div>
        <div class="field">
          <label for="f-scope">担当領域・役割概要</label>
          <textarea id="f-scope" rows="4" placeholder="チームの担当領域や役割を記入してください（300文字程度）"></textarea>
        </div>
        <div id="err-step0" class="error-msg" hidden></div>
        <div class="btn-row">
          <button class="btn-pri" onclick="next(0)">次へ →</button>
        </div>
      </div>
    </div>

    <!-- Step2: 予定案件（タスク3-2） -->
    <div id="step1" class="step-panel" hidden>
      <div class="card">
        <h2>Step 2 — 予定案件</h2>
        <div id="proj-body"></div>
        <button class="add-btn" onclick="addProj()">＋ 案件を追加</button>
        <div class="btn-row">
          <button class="btn-sec" onclick="goStep(0)">← 戻る</button>
          <button class="btn-pri" onclick="next(1)">次へ →</button>
        </div>
      </div>
    </div>

    <!-- Step3: 育成方針 -->
    <div id="step2" class="step-panel" hidden>
      <div class="card">
        <h2>Step 3 — 育成方針</h2>
        <div id="policy-body"></div>
        <button class="add-btn" onclick="addPolicy()">＋ 追加</button>
        <div class="btn-row">
          <button class="btn-sec" onclick="goStep(1)">← 戻る</button>
          <button class="btn-pri" onclick="next(2)">次へ →</button>
        </div>
      </div>
    </div>

    <!-- Step4: メンバー別育成目標 -->
    <div id="step3" class="step-panel" hidden>
      <div class="card">
        <h2>Step 4 — メンバー別育成目標</h2>
        <div id="member-body"></div>
        <button class="add-btn" onclick="addMember()">＋ メンバーを追加</button>
        <div class="btn-row">
          <button class="btn-sec" onclick="goStep(2)">← 戻る</button>
          <button class="btn-gen" onclick="generate()">レポートを生成</button>
        </div>
      </div>
    </div>

    <!-- プレビューエリア -->
    <div id="preview-wrap" hidden>
      <div class="card">
        <div class="preview-header">
          <h2>レポートプレビュー</h2>
          <button class="btn-dl" onclick="download()">HTMLをダウンロード</button>
        </div>
        <iframe id="preview-frame"
                sandbox="allow-same-origin"
                style="width:100%; border:none; border-radius:6px; display:block;"
                title="レポートプレビュー"></iframe>
      </div>
      <div style="text-align:center; margin-top:8px;">
        <button class="btn-sec" onclick="goStep(3)">← 入力に戻る</button>
      </div>
    </div>

  </div>

  <script>
    // ==============================================
    // 状態変数
    // ==============================================
    let currentStep = 0;
    let projIds     = [];
    let policyIds   = [];
    let memberIds   = [];
    let reportHTML  = '';

    // ==============================================
    // ステップ切り替え（タスク4-1で完成）
    // ==============================================
    function goStep(n) {
      document.getElementById('step' + currentStep).setAttribute('hidden', '');
      document.getElementById('preview-wrap').setAttribute('hidden', '');
      document.querySelectorAll('.step-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
      });
      currentStep = n;
      document.getElementById('step' + n).removeAttribute('hidden');
    }

    // ==============================================
    // 案件行 追加・削除
    // ==============================================
    function addProj() {
      const id   = Date.now();
      projIds.push(id);
      const body = document.getElementById('proj-body');
      const div  = document.createElement('div');
      div.id     = 'proj-row-' + id;
      div.className = 'proj-card';
      div.innerHTML = `
        <div class="proj-row1">
          <div class="field proj-field-name">
            <label>案件名 <span class="req">*</span></label>
            <input type="text" id="pnm${id}" placeholder="案件名">
          </div>
          <div class="field proj-field-overview">
            <label>概要</label>
            <input type="text" id="pov${id}" placeholder="案件の概要">
          </div>
          <button class="del-btn" onclick="delRow(projIds,${id},'proj-row-${id}')">✕ 削除</button>
        </div>
        <div class="proj-row2">
          <div class="field proj-field-period">
            <label>実施期間</label>
            <div class="period-inputs">
              <input type="month" id="pts${id}">
              <span class="period-sep">〜</span>
              <input type="month" id="pte${id}">
            </div>

    // ==============================================

    // ==============================================
    (function init() {

      const fy  = now.getMonth() >= 3          // 4月(3)以降なら当年度、3月(2)以前なら前年度

    // ==============================================
    // XSSサニタイズ
    // ==============================================
    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ==============================================
    // フォームデータ収集
    // ==============================================
    function val(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }

    function collect() {
      // Step1 基本情報
      const basic = {
        year:   val('f-year'),
        team:   val('f-team'),
        leader: val('f-leader'),
        period: val('f-period'),
        date:   val('f-date'),
        theme:  val('f-theme'),
        scope:  val('f-scope'),
      };

      // Step2 予定案件（空行フィルタリング）
      const projects = projIds
        .map(id => ({
          name:     val('pnm' + id),
          overview: val('pov' + id),
          start:    val('pts' + id),
          end:      val('pte' + id),
          skill:    val('psk' + id),
          priority: val('ppr' + id),
        }))
        .filter(p => p.name);

      // Step3 育成方針（空エントリはフィルタリング）
      const policies = policyIds
        .map(id => ({
          focus:  val('pfoc' + id),
          vision: val('pvis' + id),
          gap:    val('pgap' + id),
          policy: val('ppol' + id),
        }))
        .filter(p => p.focus || p.vision || p.gap || p.policy);

      // Step4 メンバー育成目標（空行フィルタリング）
      const members = memberIds
        .map(id => ({
          name:         val('mnm' + id),
          skill:        val('msk' + id),
          currentLevel: parseInt(val('mcl' + id)) || 1,
          goalLevel:    parseInt(val('mgl' + id)) || 1,
          measure:      val('mms' + id),
        }))
        .filter(m => m.name);

      return { basic, projects, policies, members };
    }

    // ==============================================
    // ヘルパー関数群

    // 重要度バッジ HTML
    function priorityBadge(p) {
      const map = {
        '高': { bg: '#fff1f0', color: '#cf1322', border: '#ffa39e' },
        '中': { bg: '#fffbe6', color: '#d46b08', border: '#ffe58f' },
        '低': { bg: '#f6ffed', color: '#389e0d', border: '#b7eb8f' },
      };
      const s = map[p] || map['中'];
      return `<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;background:${s.bg};color:${s.color};border:1px solid ${s.border};">${escapeHTML(p)}</span>`;
    }

    // スキルレベルバー HTML（1〜5段階）
    function lvBar(lv) {
      const n = Math.min(5, Math.max(1, parseInt(lv) || 1));
      let bars = '';
      for (let i = 1; i <= 5; i++) {
        const filled = i <= n;
        bars += `<span style="display:inline-block;width:14px;height:10px;border-radius:2px;margin-right:2px;background:${filled ? '#02993B' : '#e5e7eb'};"></span>`;
      }
      return `<span style="display:inline-flex;align-items:center;">${bars}<span style="margin-left:5px;font-size:0.78rem;color:#374151;font-weight:600;">Lv${n}</span></span>`;
    }

    // 氏名からイニシャル（最大2文字）
    function initials(name) {
      const s = String(name).trim();
      if (!s) return '?';
      // 姓名スペース区切りなら姓の1文字目 + 名の1文字目
      const parts = s.split(/[\s　]+/);
      if (parts.length >= 2) return parts[0][0] + parts[1][0];
      return s.slice(0, 2);
    }

    // 氏名から一貫したアバター背景色
    function avatarColor(name) {
      const palette = [
        '#02993B','#0f6e56','#1a7bbf','#7048e8',
        '#c0392b','#d35400','#16a085','#2980b9',
      ];
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash += name.charCodeAt(i);
      return palette[hash % palette.length];
    }

    // ==============================================
    // レポート生成
    // ==============================================
    function generate() {
      const data  = collect();
      reportHTML  = buildReport(data);

      document.getElementById('step' + currentStep).setAttribute('hidden', '');

      const wrap  = document.getElementById('preview-wrap');
      const frame = document.getElementById('preview-frame');
      wrap.removeAttribute('hidden');
      frame.srcdoc = reportHTML;
      frame.onload = () => {
        try {
          frame.style.height = (frame.contentDocument.body.scrollHeight + 40) + 'px';
        } catch(e) {
          frame.style.height = '900px';
        }
      };
      wrap.scrollIntoView({ behavior: 'smooth' });
    }

    // ==============================================
    // HTMLダウンロード
    // ==============================================
    function download() {
      if (!reportHTML) return;
      const blob = new Blob([reportHTML], { type: 'text/html;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'skill-report.html';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ==============================================
    // 保存（JSONダウンロード）
    // ==============================================
    function saveData() {
      const data = collect();
      const payload = {
        _meta: {
          version: '1.0',
          savedAt: new Date().toISOString(),
          app: 'skill-report-generator'
        },
        basic:    data.basic,
        projects: data.projects,
        policies: data.policies,
        members:  data.members,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'skill-report-data.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ==============================================
    // 読み込み（ファイル選択トリガー）
    // ==============================================
    function loadData() {
      document.getElementById('load-file-input').click();
    }

    function onFileSelected(event) {
      const file = event.target.files[0];
      event.target.value = '';  // 同じファイルを再選択できるようにリセット
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        let data;
        try {
          data = JSON.parse(e.target.result);
        } catch (err) {
          showLoadError('JSONファイルの解析に失敗しました。正しいファイルを選択してください。');
          return;
        }

        if (!data._meta || data._meta.app !== 'skill-report-generator') {
          showLoadError('このアプリ用のデータファイルではありません。');
          return;
        }
        if (data._meta.version !== '1.0') {
          showLoadError('対応していないバージョンのデータファイルです。');
          return;
        }
        if (!data.basic || !Array.isArray(data.projects) || !Array.isArray(data.policies) || !Array.isArray(data.members)) {
          showLoadError('データファイルの形式が正しくありません。');
          return;
        }

        if (!confirm('現在の入力内容が上書きされます。続行しますか？')) return;

        document.getElementById('load-error').setAttribute('hidden', '');
        restoreData(data);
      };
      reader.readAsText(file);
    }

    function showLoadError(msg) {
      const el = document.getElementById('load-error');
      el.textContent = msg;
      el.removeAttribute('hidden');
    }

    // ==============================================
    // データ復元
    // ==============================================
    function restoreData(data) {
      restoreBasic(data.basic);
      restoreProjects(data.projects);
      restorePolicies(data.policies);
      restoreMembers(data.members);
      document.querySelectorAll('.step-btn').forEach(btn => btn.classList.remove('done'));
      goStep(0);
    }

    function restoreBasic(b) {
      document.getElementById('f-year').value   = b.year   || '';
      document.getElementById('f-team').value   = b.team   || '';
      document.getElementById('f-leader').value = b.leader || '';
      document.getElementById('f-period').value = b.period || '';
      document.getElementById('f-date').value   = b.date   || '';
      document.getElementById('f-theme').value  = b.theme  || '';
      document.getElementById('f-scope').value  = b.scope  || '';
    }

    function restoreProjects(projects) {
      projIds.length = 0;
      document.getElementById('proj-body').innerHTML = '';
      if (projects.length === 0) { addProj(); return; }
      projects.forEach(p => {
        addProj();
        const id = projIds[projIds.length - 1];
        document.getElementById('pnm' + id).value = p.name     || '';
        document.getElementById('pov' + id).value = p.overview || '';
        document.getElementById('pts' + id).value = p.start    || '';
        document.getElementById('pte' + id).value = p.end      || '';
        document.getElementById('psk' + id).value = p.skill    || '';
        document.getElementById('ppr' + id).value = p.priority || '中';
      });
    }

    function restorePolicies(policies) {
      policyIds.length = 0;
      document.getElementById('policy-body').innerHTML = '';
      if (policies.length === 0) { addPolicy(); return; }
      policies.forEach(p => {
        addPolicy();
        const id = policyIds[policyIds.length - 1];
        document.getElementById('pfoc' + id).value = p.focus  || '';
        document.getElementById('pvis' + id).value = p.vision || '';
        document.getElementById('pgap' + id).value = p.gap    || '';
        document.getElementById('ppol' + id).value = p.policy || '';
      });
    }

    function restoreMembers(members) {
      memberIds.length = 0;
      document.getElementById('member-body').innerHTML = '';
      if (members.length === 0) { addMember(); return; }
      members.forEach(m => {
        addMember();
        const id = memberIds[memberIds.length - 1];
        document.getElementById('mnm' + id).value = m.name    || '';
        document.getElementById('msk' + id).value = m.skill   || '';
        document.getElementById('mcl' + id).value = String(m.currentLevel || 1);
        document.getElementById('mgl' + id).value = String(m.goalLevel    || 1);
        document.getElementById('mms' + id).value = m.measure || '';
      });
    }

    function buildProjects(projects) {

    ${priorityBadge(p.priority)}
  </div>
  ${p.overview ? `<div class="proj-overview">${escapeHTML(p.overview)}</div>` : ''}
  <div class="proj-meta">
    <div class="proj-meta-item"><span class="proj-meta-label">実施期間:</span> ${escapeHTML(period)}</div>
    ${p.skill ? `<div class="proj-meta-item"><span class="proj-meta-label">スキル領域:</span> ${escapeHTML(p.skill)}</div>` : ''}
  </div>
</div>`;
          }).join('');

      return `
<div class="section">
  <div class="section-title"><span class="section-num">1</span>予定案件 一覧</div>
  <div class="proj-list">${items}</div>
</div>`;
    }

    // ----------------------------------------------
    // 育成方針
    // ----------------------------------------------
    function buildPolicy(policies) {
      if (policies.length === 0) {
        return `
<div class="section">
  <div class="section-title"><span class="section-num">2</span>育成方針</div>
  <p class="empty-note">育成方針の入力はありません。</p>
</div>`;
      }

      const entries = policies.map((p, i) => {
        const blocks = [
          p.vision && `<div class="policy-block"><div class="policy-label">目指す人材像</div><div class="policy-value">${escapeHTML(p.vision)}</div></div>`,
          p.gap    && `<div class="policy-block policy-full"><div class="policy-label">現状の課題・ギャップ</div><div class="policy-value">${escapeHTML(p.gap)}</div></div>`,
          p.policy && `<div class="policy-block policy-full"><div class="policy-label">育成方針</div><div class="policy-value">${escapeHTML(p.policy)}</div></div>`,
        ].filter(Boolean).join('');
        const divider = i > 0 ? 'style="margin-top:28px;padding-top:24px;border-top:1px solid #e5e7eb;"' : '';
        return `<div ${divider}>
  ${p.focus ? `<div class="policy-skill-title">${escapeHTML(p.focus)}</div>` : ''}
  <div class="policy-grid">${blocks}</div>
</div>`;
      }).join('');

      return `
<div class="section">
  <div class="section-title"><span class="section-num">2</span>育成方針</div>
  ${entries}
</div>`;
    }

    // ----------------------------------------------
    // メンバー別育成目標
    // ----------------------------------------------
    function buildMembers(members) {
      const cards = members.length === 0
        ? `<p class="empty-note">メンバーの登録はありません。</p>`
        : members.map(m => {
            const color = avatarColor(m.name);
            const ini   = escapeHTML(initials(m.name));
            return `
<div class="member-card">
  <div class="member-header">
    <div class="member-avatar" style="background:${color};">${ini}</div>
    <div>
      <div class="member-name">${escapeHTML(m.name)}</div>
      ${m.skill ? `<div class="member-skill">${escapeHTML(m.skill)}</div>` : ''}
    </div>
  </div>
  <div class="member-levels">
    <div><div class="lv-label">現在レベル</div>${lvBar(m.currentLevel)}</div>
    <div><div class="lv-label">目標レベル</div>${lvBar(m.goalLevel)}</div>
  </div>
  ${m.measure ? `<div class="member-measure-label">主な育成施策</div><div class="member-measure">${escapeHTML(m.measure)}</div>` : ''}
</div>`;
          }).join('');

      return `
<div class="section">
  <div class="section-title"><span class="section-num">3</span>メンバー別 育成目標</div>
  <div class="member-grid">${cards}</div>
</div>`;
    }

    // ----------------------------------------------
    // スキルレベル定義
    // ----------------------------------------------
    function buildLevelDef() {
      const defs = [
        [1, '入門',       '基本的な概念を理解しており、指導のもとで作業できる'],
        [2, '初級',       '基本的な作業を自立して実施できる。標準的な問題を解決できる'],
        [3, '中級',       '標準的な業務を自立して遂行できる。後輩への指導ができる'],
        [4, '上級',       '複雑な問題を解決しチームをリードできる。社内の専門家として機能する'],
        [5, 'エキスパート', '業界水準で高度な専門知識を持ち、組織横断的に貢献できる'],
      ];
      const rows = defs.map(([lv, name, desc]) =>
        `<tr><td style="text-align:center;"><span class="lv-circle">${lv}</span></td><td><strong>${name}</strong></td><td>${desc}</td></tr>`
      ).join('');

      return `
<div class="section">
  <div class="section-title"><span class="section-num">4</span>スキルレベル定義</div>
  <table class="data-table">
    <thead><tr><th style="width:56px;">Lv</th><th style="width:130px;">レベル名</th><th>定義</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div>`;
    }

    // ----------------------------------------------
    // フッター
    // ----------------------------------------------
    function buildFooter(b) {
      const now = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
      return `
<div class="report-footer">
  <div>${escapeHTML(b.team || '')}　${escapeHTML(b.leader || '')} 作成</div>
  <div>生成日時: ${now}</div>
</div>`;
    }

    // ==============================================
    // レポート用CSS
    // ==============================================
    function buildReportCSS() {
      return `
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
  color: #212121; background: #f3f4f6; line-height: 1.6;
}
.report { max-width: 900px; margin: 0 auto; background: #fff; }

/* 表紙 */
.cover {
  background: #02993B; color: #fff;
  padding: 56px 48px 48px; position: relative; overflow: hidden;
}
.cover::before {
  content:''; position:absolute; right:-60px; top:-60px;
  width:240px; height:240px; background:rgba(255,255,255,.07); border-radius:50%;
}
.cover::after {
  content:''; position:absolute; left:-30px; bottom:-40px;
  width:180px; height:180px; background:rgba(255,255,255,.05); border-radius:50%;
}
.cover-label {
  display:inline-block; font-size:0.72rem; font-weight:600; letter-spacing:.1em;
  background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.4);
  padding:3px 12px; border-radius:20px; margin-bottom:16px;
}
.cover h1 { font-size:2rem; font-weight:700; letter-spacing:.02em; margin-bottom:8px; line-height:1.3; }
.cover-sub { font-size:1rem; opacity:.85; margin-bottom:32px; }
.cover-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 32px; }
.cover-item { font-size:.88rem; }
.cover-item-label { opacity:.7; font-size:.75rem; margin-bottom:2px; }
.cover-item-value { font-weight:600; }
.cover-scope {
  margin-top:24px; padding:16px 20px;
  background:rgba(255,255,255,.12); border-radius:8px;
  font-size:.85rem; line-height:1.7; white-space:pre-wrap;
}

/* セクション共通 */
.section { padding:40px 48px; border-bottom:1px solid #e5e7eb; }
.section:last-of-type { border-bottom:none; }
.section-title {
  display:flex; align-items:center; gap:10px;
  font-size:1.05rem; font-weight:700; color:#02993B;
  margin-bottom:24px; padding-bottom:10px; border-bottom:2px solid #e6f5ec;
}
.section-num {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:26px; background:#02993B; color:#fff;
  border-radius:50%; font-size:.78rem; font-weight:700; flex-shrink:0;
}
.empty-note { color:#9ca3af; font-size:.85rem; font-style:italic; padding:12px 0; }
.sub-label { font-size:.82rem; font-weight:600; color:#374151; margin-bottom:8px; }

/* 予定案件 */
.proj-list { display:flex; flex-direction:column; gap:12px; }
.proj-item {
  border:1px solid #e5e7eb; border-radius:8px;
  padding:16px 20px; border-left:4px solid #02993B;
}
.proj-item-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; gap:12px; }
.proj-name { font-size:.93rem; font-weight:600; }
.proj-overview { font-size:.83rem; color:#6b7280; margin-bottom:8px; }
.proj-meta { display:flex; gap:20px; font-size:.78rem; color:#6b7280; flex-wrap:wrap; }
.proj-meta-label { font-weight:600; color:#374151; }

/* 育成方針 */
.policy-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.policy-block { background:#f9fafb; border-radius:8px; padding:14px 16px; }
.policy-full { grid-column:1/-1; }
.policy-skill-title {
  font-size:.95rem; font-weight:700; color:#212121;
  padding:6px 12px; margin-bottom:12px;
  border-left:4px solid #02993B; background:#f9fafb; border-radius:0 6px 6px 0;
}
.policy-label { font-size:.73rem; font-weight:600; color:#02993B; letter-spacing:.04em; margin-bottom:5px; }
.policy-value { font-size:.87rem; line-height:1.7; white-space:pre-wrap; }

/* 共通テーブル */
.data-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.data-table th {
  background:#e6f5ec; color:#02993B; font-weight:600;
  padding:8px 12px; text-align:left; border-bottom:2px solid #02993B;
}
.data-table td { padding:9px 12px; border-bottom:1px solid #f3f4f6; color:#374151; vertical-align:top; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:nth-child(even) td { background:#f9fafb; }
.lv-circle {
  display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:26px; background:#02993B; color:#fff;
  border-radius:50%; font-weight:700; font-size:.8rem;
}

/* メンバーカード */
.member-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.member-card { border:1px solid #e5e7eb; border-radius:10px; padding:18px 20px; }
.member-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.member-avatar {
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:.85rem; font-weight:700; flex-shrink:0;
}
.member-name { font-size:.93rem; font-weight:700; }
.member-skill { font-size:.76rem; color:#6b7280; margin-top:1px; }
.member-levels { display:flex; gap:24px; margin-bottom:12px; }
.lv-label { font-size:.72rem; color:#6b7280; font-weight:600; margin-bottom:3px; }
.member-measure-label { font-size:.72rem; color:#02993B; font-weight:600; margin-bottom:4px; }

  font-size:.82rem; color:#374151; background:#f9fafb;

}

.report-footer {
  background:#014d20; color:rgba(255,255,255,.75);
  padding:18px 48px; font-size:.78rem;
  display:flex; justify-content:space-between; align-items:center;
}

/* 印刷 */
@media print {
  body { background:#fff; }
  .cover { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .section { page-break-inside:avoid; }
}`;
    }

    // バリデーション付きステップ進行（タスク4-1で完成）
    function next(n) {
      if (n === 0) {
        const year   = document.getElementById('f-year').value.trim();
        const team   = document.getElementById('f-team').value.trim();
        const leader = document.getElementById('f-leader').value.trim();
        const errEl  = document.getElementById('err-step0');
        if (!year || !team || !leader) {
          errEl.textContent = '年度・部門 / チーム名・リーダー名はすべて必須項目です。';
          errEl.removeAttribute('hidden');
          return;
        }
        errEl.setAttribute('hidden', '');
      }
      document.querySelectorAll('.step-btn')[n].classList.add('done');
      goStep(n + 1);
    }
  </script>
</body>
</html>
